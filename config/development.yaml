logger:
  enable: true
  pretty_backtrace: true
  level: debug
  format: compact

server:
  binding: "{{ get_env(name='SERVER_HOST', default='0.0.0.0') }}"
  port: {{ get_env(name="SERVER_PORT", default="8080") }}
  host: "http://localhost"
  middlewares:
    static_assets:
      enable: true
      must_exist: true
      precompressed: false
      folder:
        uri: "/static"
        path: "assets/static"
      fallback: "assets/static/404.html"

database:
  uri: "{{ get_env(name='DATABASE_URL', default='postgres://postgres:postgres@localhost:5432/mpi') }}"
  enable_logging: false
  connect_timeout: 500
  idle_timeout: 500
  min_connections: 1
  max_connections: 10
  auto_migrate: false
  dangerously_truncate: false
  dangerously_recreate: false

workers:
  mode: ForegroundBlocking
