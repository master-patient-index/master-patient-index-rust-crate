logger:
  enable: false
  pretty_backtrace: false
  level: warn
  format: compact

server:
  binding: "127.0.0.1"
  port: 8181
  host: "http://localhost"
  middlewares:
    static_assets:
      enable: false
      must_exist: false
      precompressed: false
      folder:
        uri: "/static"
        path: "assets/static"
      fallback: "assets/static/404.html"

database:
  uri: "{{ get_env(name='DATABASE_URL', default='postgres://postgres:postgres@localhost:5432/mpi_test') }}"
  enable_logging: false
  connect_timeout: 500
  idle_timeout: 500
  min_connections: 1
  max_connections: 5
  auto_migrate: false
  dangerously_truncate: true
  dangerously_recreate: false

workers:
  mode: ForegroundBlocking
